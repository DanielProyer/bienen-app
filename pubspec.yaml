name: bienen_app
description: "Bienen Arosa - Imkerei Projekt WebApp"
publish_to: 'none'
version: 1.36.0+58

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.8.3
  intl: ^0.19.0
  flutter_markdown: ^0.7.6
  url_launcher: ^6.3.2
  fl_chart: ^0.70.0
  image_picker: ^1.1.2
  file_picker: ^8.1.0
  flutter_svg: ^2.0.10
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/recherche/
    - assets/bauplan/
    - assets/bau/
    - assets/hv_bau/
    - assets/honigverarbeitung/
    - assets/wissen/
    - assets/wissen/fotos/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
