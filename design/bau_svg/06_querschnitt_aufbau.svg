<svg xmlns="http://www.w3.org/2000/svg" width="440" height="330" viewBox="0 0 440 330" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="330" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#4E342E">Querschnitt – Aufbau von unten nach oben</text>

  <!-- Boden -->
  <rect x="0" y="262" width="440" height="68" fill="#EBDFC3"/>
  <line x1="0" y1="262" x2="440" y2="262" stroke="#B79E6A" stroke-width="2"/>

  <!-- Erdschraube -->
  <path d="M196 262 L236 262 L226 320 L206 320 Z" fill="#9AA0A6" stroke="#555"/>
  <text x="300" y="300" font-size="10" fill="#333">Erdschraube</text>

  <!-- Pfosten -->
  <rect x="196" y="196" width="40" height="66" fill="#D2A970" stroke="#8B5E0B"/>
  <text x="300" y="235" font-size="10" fill="#333">Pfosten + Nivellier-Bolzen</text>

  <!-- Nivellier-Scheibe -->
  <rect x="190" y="189" width="52" height="7" fill="#7d8286" stroke="#555"/>

  <!-- Doppelbalken -->
  <rect x="150" y="168" width="140" height="21" fill="#C79A5B" stroke="#8B5E0B"/>
  <text x="300" y="184" font-size="10" fill="#333">Doppelbalken 2×90×90</text>

  <!-- Platte -->
  <rect x="140" y="152" width="160" height="16" fill="#E9D9B0" stroke="#C9A24B"/>
  <text x="300" y="165" font-size="10" fill="#333">Platte 27 mm</text>

  <!-- Waage -->
  <rect x="150" y="122" width="140" height="30" fill="#CFD8DC" stroke="#607D8B"/>
  <text x="300" y="141" font-size="10" fill="#333">HiveWatch ~72 mm</text>

  <!-- Beute -->
  <rect x="146" y="60" width="148" height="62" fill="#F0C868" stroke="#8B5E0B"/>
  <polygon points="140,60 300,60 286,44 154,44" fill="#8d6e3a" stroke="#5a4522"/>
  <text x="220" y="98" font-size="11" fill="#5a3d0a" text-anchor="middle">Dadant-Beute</text>
  <rect x="150" y="112" width="60" height="8" fill="#7a5a24"/>
  <text x="300" y="95" font-size="10" fill="#333">Flugloch</text>

  <!-- Beutenboden 44 cm -->
  <line x1="70" y1="122" x2="70" y2="262" stroke="#C0392B" stroke-width="1.5"/>
  <polygon points="66,128 74,128 70,120" fill="#C0392B"/>
  <polygon points="66,256 74,256 70,264" fill="#C0392B"/>
  <text x="60" y="196" font-size="12" font-weight="700" fill="#C0392B" transform="rotate(-90 60 196)" text-anchor="middle">Beutenboden ≈ 44 cm</text>

  <text x="20" y="322" font-size="10" fill="#333">Reihenfolge: Erdschraube → Pfosten → Bolzen → Balken → Platte → Waage → Beute.</text>
</svg>
