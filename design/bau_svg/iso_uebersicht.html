<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff}</style></head>
<body>
<canvas id="c" width="1800" height="1200" style="width:900px;height:600px"></canvas>
<script>
const cv = document.getElementById('c'), g = cv.getContext('2d');
g.scale(2,2);
g.textBaseline = 'middle';
// Isometrische Projektion (x=Länge, y=Tiefe, z=Höhe), cm
const S = 1.55, COS = 0.866, SIN = 0.5, OX = 250, OY = 250;
function P(x,y,z){ return [ OX + (x - y)*COS*S, OY + (x + y)*SIN*S - z*S ]; }
function poly(pts, fill, stroke){
  g.beginPath(); g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) g.lineTo(pts[i][0],pts[i][1]);
  g.closePath(); if(fill){g.fillStyle=fill; g.fill();} g.strokeStyle=stroke||'#5a4522'; g.lineWidth=0.8; g.stroke();
}
// Box mit sichtbaren Flächen: top, front (y=near), right (x+w)
function box(x,y,z,w,d,h,top,front,right){
  poly([P(x,y,z),P(x+w,y,z),P(x+w,y,z+h),P(x,y,z+h)], front);      // front (y)
  poly([P(x+w,y,z),P(x+w,y+d,z),P(x+w,y+d,z+h),P(x+w,y,z+h)], right); // right (x+w)
  poly([P(x,y,z+h),P(x+w,y,z+h),P(x+w,y+d,z+h),P(x,y+d,z+h)], top);   // top
}
function label(tx,ty, fromXYZ, text, align){
  const p = P(fromXYZ[0],fromXYZ[1],fromXYZ[2]);
  g.strokeStyle='#8a6d1e'; g.lineWidth=0.8; g.beginPath(); g.moveTo(tx,ty); g.lineTo(p[0],p[1]); g.stroke();
  g.fillStyle='#8a6d1e'; g.beginPath(); g.arc(p[0],p[1],1.6,0,7); g.fill();
  g.fillStyle='#333'; g.font='11px Segoe UI, Arial'; g.textAlign=align||'left'; g.fillText(text,tx,ty);
}

// ---- Boden ----
poly([P(-18,-18,0),P(298,-18,0),P(298,70,0),P(-18,70,0)], '#EBDFC3', '#cbb98a');

// ---- Erdschrauben (Kegel) + Pfosten + Beine, an x=40 und x=240, beide Balkenachsen y=8 & y=40 ----
const legX=[40,240], beamY=[8,40];
function screw(x,y){ const a=P(x+4.5,y+4.5,0), b=P(x+4.5,y+4.5,-16); g.strokeStyle='#777'; g.fillStyle='#9AA0A6';
  g.beginPath(); const t1=P(x+1,y+4.5,0),t2=P(x+8,y+4.5,0); g.moveTo(t1[0],t1[1]); g.lineTo(t2[0],t2[1]); g.lineTo(b[0],b[1]); g.closePath(); g.fill(); g.stroke(); }
for(const bx of legX) for(const by of beamY){ screw(bx,by); box(bx,by,0,9,9,25,'#C9A24B','#A67C3D','#8B5E0B'); }

// ---- Doppelbalken: 2 durchgehende Bretter (front y=8, back y=40), z 25..43 ----
box(0,8,25,280,9,18,'#D9B676','#C79A5B','#9c7434');
box(0,40,25,280,9,18,'#D9B676','#C79A5B','#9c7434');

// ---- 4 Stapel: Platte -> Waage -> Beute ----
const plateX=[6,74,142,210];
for(const px of plateX){
  box(px,3,43,56,50,3,'#EFE1BC','#E1CE9E','#C9A24B');          // Platte
  box(px+3,7,46,50,43,7,'#DCE3E7','#C3CDD2','#9FB0B8');         // Waage
  box(px+3,7,53,50,43,58,'#F2CE74','#E3B551','#C6982F');        // Beute
  box(px+2,6,111,52,45,4,'#8d6e3a','#7a5f31','#5f4a26');        // Deckel
  const fl=P(px+4,7,57);                                        // Flugloch (front)
  const fl2=P(px+34,7,57), fl3=P(px+34,7,62), fl4=P(px+4,7,62);
  g.fillStyle='#6b4f22'; g.beginPath(); g.moveTo(fl[0],fl[1]); g.lineTo(fl2[0],fl2[1]); g.lineTo(fl3[0],fl3[1]); g.lineTo(fl4[0],fl4[1]); g.closePath(); g.fill();
}

// ---- Beutenboden 44 cm (links) ----
const g1=P(-18,64,0), g2=P(-18,64,44);
g.strokeStyle='#C0392B'; g.lineWidth=1.4; g.beginPath(); g.moveTo(g1[0],g1[1]); g.lineTo(g2[0],g2[1]); g.stroke();
g.fillStyle='#C0392B';
g.beginPath(); g.moveTo(g1[0]-3,g1[1]-3); g.lineTo(g1[0]+3,g1[1]-3); g.lineTo(g1[0],g1[1]+2); g.fill();
g.beginPath(); g.moveTo(g2[0]-3,g2[1]+3); g.lineTo(g2[0]+3,g2[1]+3); g.lineTo(g2[0],g2[1]-2); g.fill();
g.save(); g.translate((g1[0]+g2[0])/2-8,(g1[1]+g2[1])/2); g.rotate(-Math.PI/2); g.font='bold 12px Segoe UI, Arial'; g.textAlign='center'; g.fillText('Beutenboden ≈ 44 cm',0,0); g.restore();

// ---- Titel ----
g.fillStyle='#4E342E'; g.font='bold 16px Segoe UI, Arial'; g.textAlign='left';
g.fillText('Bienenstand – Übersicht (4× Dadant 10er + HiveWatch)', 20, 24);
g.fillStyle='#666'; g.font='11px Segoe UI, Arial';
g.fillText('1 Stand · 4 höhenverstellbare Beine · Doppelbalken 2×90×90 (durchgehend)', 20, 42);

// ---- Labels ----
label(600, 250, [280,8,34], 'Doppelbalken 2×90×90 (durchgehend)', 'left');
label(600, 300, [240,8,30], 'Nivellier-Bolzen M16 (±25 mm)', 'left');
label(600, 345, [240,8,4], 'Krinner-Erdschraube', 'left');
label(600, 150, [180,3,46], 'ebene Platte 560×500 (Waage + Beute)', 'left');
label(150, 470, [70,7,55], 'Fluglöcher Südost', 'left');
</script>
</body></html>
