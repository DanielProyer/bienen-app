<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="300" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#4E342E">Platte zuschneiden &amp; versiegeln</text>

  <!-- Platte -->
  <rect x="120" y="70" width="210" height="160" fill="#E9D9B0" stroke="#C0392B" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="225" y="155" font-size="12" fill="#8a6d1e" text-anchor="middle">Schaltafel 27 mm</text>

  <!-- Entwässerungslöcher -->
  <g fill="#ffffff" stroke="#555">
    <circle cx="160" cy="110" r="6"/><circle cx="290" cy="110" r="6"/>
    <circle cx="160" cy="190" r="6"/><circle cx="290" cy="190" r="6"/>
  </g>
  <text x="290" y="90" font-size="10" fill="#333">Ø 8 mm Entwässerung</text>

  <!-- Masse -->
  <line x1="120" y1="55" x2="330" y2="55" stroke="#C0392B"/>
  <line x1="120" y1="51" x2="120" y2="59" stroke="#C0392B"/><line x1="330" y1="51" x2="330" y2="59" stroke="#C0392B"/>
  <text x="225" y="48" font-size="11" fill="#C0392B" text-anchor="middle">560 mm</text>
  <line x1="350" y1="70" x2="350" y2="230" stroke="#C0392B"/>
  <text x="365" y="150" font-size="11" fill="#C0392B" transform="rotate(-90 365 150)" text-anchor="middle">500 mm</text>

  <text x="20" y="262" font-size="11" fill="#C0392B">Rote Linie = alle Schnittkanten sofort versiegeln (Hirnholz!).</text>
  <text x="20" y="282" font-size="11" fill="#333">2–4 Entwässerungslöcher Ø 8 mm je Platte bohren.</text>
</svg>
