<svg xmlns="http://www.w3.org/2000/svg" width="440" height="270" viewBox="0 0 440 270" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="270" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#4E342E">Platte aufschrauben (waagerecht)</text>

  <!-- Balken (Querschnitt vorn/hinten) -->
  <rect x="150" y="150" width="44" height="44" fill="#C79A5B" stroke="#8B5E0B"/>
  <rect x="256" y="150" width="44" height="44" fill="#C79A5B" stroke="#8B5E0B"/>
  <text x="172" y="215" font-size="10" fill="#333" text-anchor="middle">Balken</text>
  <text x="278" y="215" font-size="10" fill="#333" text-anchor="middle">Balken</text>

  <!-- Achse 400 -->
  <line x1="172" y1="232" x2="278" y2="232" stroke="#C0392B"/>
  <line x1="172" y1="228" x2="172" y2="236" stroke="#C0392B"/><line x1="278" y1="228" x2="278" y2="236" stroke="#C0392B"/>
  <text x="225" y="250" font-size="11" fill="#C0392B" text-anchor="middle">Balkenachse 400 mm</text>

  <!-- Platte -->
  <rect x="120" y="128" width="210" height="20" fill="#E9D9B0" stroke="#C9A24B"/>
  <text x="345" y="142" font-size="10" fill="#333">Platte</text>

  <!-- Schrauben von oben -->
  <g stroke="#444" stroke-width="2.5">
    <line x1="172" y1="112" x2="172" y2="150"/><line x1="278" y1="112" x2="278" y2="150"/>
  </g>
  <polygon points="168,150 176,150 172,158" fill="#444"/>
  <polygon points="274,150 282,150 278,158" fill="#444"/>
  <text x="225" y="104" font-size="11" fill="#333" text-anchor="middle">A2 5×50 von oben</text>

  <!-- Wasserwaage -->
  <rect x="150" y="116" width="150" height="10" rx="2" fill="#FCE9A6" stroke="#B8860B"/>
  <rect x="218" y="118" width="14" height="6" fill="#7ec96b" stroke="#4e9a3d"/>
  <text x="345" y="122" font-size="10" fill="#333">Libelle</text>

  <text x="20" y="268" font-size="11" fill="#333">Jede Platte mittig über beide Balken, mit Wasserwaage prüfen (steift aus).</text>
</svg>
