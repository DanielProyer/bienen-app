<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="15" font-weight="700" fill="#4E342E">Doppelbalken – versetzter Stoss</text>

  <!-- Obere Lage: 0,7 + 1,4 + 0,7 -->
  <text x="20" y="70" font-size="12" fill="#333">Obere Lage</text>
  <rect x="70" y="60" width="88"  height="24" fill="#D2A970" stroke="#8B5E0B"/>
  <rect x="162" y="60" width="176" height="24" fill="#D2A970" stroke="#8B5E0B"/>
  <rect x="342" y="60" width="88"  height="24" fill="#D2A970" stroke="#8B5E0B"/>
  <text x="114" y="77" font-size="10" fill="#5a3d0a" text-anchor="middle">0,7</text>
  <text x="250" y="77" font-size="10" fill="#5a3d0a" text-anchor="middle">1,4 m</text>
  <text x="386" y="77" font-size="10" fill="#5a3d0a" text-anchor="middle">0,7</text>

  <!-- Untere Lage: 1,4 + 1,4 -->
  <text x="20" y="106" font-size="12" fill="#333">Untere Lage</text>
  <rect x="70"  y="96" width="180" height="24" fill="#C79A5B" stroke="#8B5E0B"/>
  <rect x="250" y="96" width="180" height="24" fill="#C79A5B" stroke="#8B5E0B"/>
  <text x="160" y="113" font-size="10" fill="#5a3d0a" text-anchor="middle">1,4 m</text>
  <text x="340" y="113" font-size="10" fill="#5a3d0a" text-anchor="middle">1,4 m</text>

  <!-- Stossmarkierungen (versetzt) -->
  <line x1="162" y1="52" x2="162" y2="128" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="342" y1="52" x2="342" y2="128" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="3 3"/>
  <line x1="250" y1="52" x2="250" y2="128" stroke="#1f7a3d" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="220" y="146" font-size="11" fill="#C0392B">Stösse liegen nie übereinander</text>

  <!-- Beine -->
  <rect x="104" y="120" width="16" height="34" fill="#B98B4E" stroke="#8B5E0B"/>
  <rect x="330" y="120" width="16" height="34" fill="#B98B4E" stroke="#8B5E0B"/>
  <text x="112" y="168" font-size="10" fill="#333" text-anchor="middle">Bein</text>
  <text x="338" y="168" font-size="10" fill="#333" text-anchor="middle">Bein</text>

  <!-- Gesamtmass -->
  <line x1="70" y1="185" x2="430" y2="185" stroke="#C0392B" stroke-width="1"/>
  <line x1="70" y1="181" x2="70" y2="189" stroke="#C0392B"/><line x1="430" y1="181" x2="430" y2="189" stroke="#C0392B"/>
  <text x="250" y="200" font-size="11" fill="#C0392B" text-anchor="middle">Balken gesamt 2,8 m</text>

  <text x="20" y="235" font-size="11" fill="#333">Je Balkenseite 2 Lagen 90×90 versetzt verleimt/verschraubt,</text>
  <text x="20" y="252" font-size="11" fill="#333">alle ~20 cm mit 8×100-Schrauben (versetzt) + D4-Leim.</text>
  <text x="20" y="269" font-size="11" fill="#1f7a3d">→ Jede Lage überbrückt den Stoss der anderen = durchgehend steif.</text>
</svg>
