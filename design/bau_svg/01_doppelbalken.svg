<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="15" font-weight="700" fill="#4E342E">Doppelbalken – 2 durchgehende Lagen</text>

  <!-- Obere Lage: durchgehend 2,8 m -->
  <text x="20" y="76" font-size="12" fill="#333">Obere Lage</text>
  <rect x="90" y="66" width="330" height="24" fill="#D2A970" stroke="#8B5E0B" stroke-width="1.5"/>
  <text x="255" y="83" font-size="10" fill="#5a3d0a" text-anchor="middle">durchgehend 2,8 m (90×90)</text>

  <!-- Untere Lage: durchgehend 2,8 m -->
  <text x="20" y="112" font-size="12" fill="#333">Untere Lage</text>
  <rect x="90" y="92" width="330" height="24" fill="#C79A5B" stroke="#8B5E0B" stroke-width="1.5"/>
  <text x="255" y="109" font-size="10" fill="#5a3d0a" text-anchor="middle">durchgehend 2,8 m (90×90)</text>

  <!-- Schrauben alle ~20 cm, versetzt -->
  <g fill="#4E342E">
    <circle cx="110" cy="80" r="2.2"/><circle cx="134" cy="102" r="2.2"/>
    <circle cx="158" cy="80" r="2.2"/><circle cx="182" cy="102" r="2.2"/>
    <circle cx="206" cy="80" r="2.2"/><circle cx="230" cy="102" r="2.2"/>
    <circle cx="254" cy="80" r="2.2"/><circle cx="278" cy="102" r="2.2"/>
    <circle cx="302" cy="80" r="2.2"/><circle cx="326" cy="102" r="2.2"/>
    <circle cx="350" cy="80" r="2.2"/><circle cx="374" cy="102" r="2.2"/><circle cx="398" cy="80" r="2.2"/>
  </g>
  <text x="255" y="140" font-size="11" fill="#1f7a3d" text-anchor="middle">verleimt (D4) + alle ~20 cm verschraubt (8×100, versetzt)</text>

  <!-- Beine (eingerückt ~400 mm) -->
  <rect x="126" y="116" width="16" height="34" fill="#B98B4E" stroke="#8B5E0B"/>
  <rect x="360" y="116" width="16" height="34" fill="#B98B4E" stroke="#8B5E0B"/>
  <text x="134" y="164" font-size="10" fill="#333" text-anchor="middle">Bein</text>
  <text x="368" y="164" font-size="10" fill="#333" text-anchor="middle">Bein</text>

  <!-- Gesamtmass -->
  <line x1="90" y1="185" x2="420" y2="185" stroke="#C0392B" stroke-width="1"/>
  <line x1="90" y1="181" x2="90" y2="189" stroke="#C0392B"/><line x1="420" y1="181" x2="420" y2="189" stroke="#C0392B"/>
  <text x="255" y="200" font-size="11" fill="#C0392B" text-anchor="middle">Balken gesamt 2,8 m</text>

  <text x="20" y="234" font-size="11" fill="#333">Je 3-m-Rahmenholz Douglasie 90×90 auf 2,8 m ablängen (4 Bretter für 2 Balken).</text>
  <text x="20" y="251" font-size="11" fill="#333">Zwei Lagen deckungsgleich verleimen + verschrauben → 2 Doppelbalken à 2,8 m.</text>
  <text x="20" y="268" font-size="11" fill="#1f7a3d">→ Durchgehend = maximale Steifigkeit, keine Stösse. Lamination wirkt gegen Verzug.</text>
</svg>
