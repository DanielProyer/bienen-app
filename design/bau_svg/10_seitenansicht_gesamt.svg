<svg xmlns="http://www.w3.org/2000/svg" width="470" height="280" viewBox="0 0 470 280" font-family="Segoe UI, Arial, sans-serif">
  <rect width="470" height="280" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#4E342E">Seitenansicht – fertiger Stand</text>

  <!-- Boden -->
  <rect x="0" y="228" width="470" height="52" fill="#EBDFC3"/>
  <line x1="0" y1="228" x2="470" y2="228" stroke="#B79E6A" stroke-width="2"/>

  <!-- Doppelbalken -->
  <rect x="40" y="150" width="392" height="15" fill="#C79A5B" stroke="#8B5E0B"/>

  <!-- Beine (2 Paare, eingerückt) -->
  <rect x="92"  y="165" width="14" height="63" fill="#B98B4E" stroke="#8B5E0B"/>
  <rect x="366" y="165" width="14" height="63" fill="#B98B4E" stroke="#8B5E0B"/>
  <path d="M95 228 L103 228 L101 250 L97 250 Z" fill="#9AA0A6" stroke="#555"/>
  <path d="M369 228 L377 228 L375 250 L371 250 Z" fill="#9AA0A6" stroke="#555"/>

  <!-- 4 Beuten -->
  <g>
    <rect x="60"  y="96" width="78" height="54" fill="#F0C868" stroke="#8B5E0B"/><polygon points="56,96 142,96 134,84 64,84" fill="#8d6e3a"/>
    <rect x="156" y="96" width="78" height="54" fill="#F0C868" stroke="#8B5E0B"/><polygon points="152,96 238,96 230,84 160,84" fill="#8d6e3a"/>
    <rect x="252" y="96" width="78" height="54" fill="#F0C868" stroke="#8B5E0B"/><polygon points="248,96 334,96 326,84 256,84" fill="#8d6e3a"/>
    <rect x="348" y="96" width="78" height="54" fill="#F0C868" stroke="#8B5E0B"/><polygon points="344,96 430,96 422,84 352,84" fill="#8d6e3a"/>
  </g>
  <!-- Fluglöcher -->
  <g fill="#7a5a24"><rect x="64" y="142" width="30" height="6"/><rect x="160" y="142" width="30" height="6"/><rect x="256" y="142" width="30" height="6"/><rect x="352" y="142" width="30" height="6"/></g>
  <text x="245" y="76" font-size="10" fill="#333" text-anchor="middle">4 Völker · Fluglöcher nach Südost</text>

  <!-- Beutenboden 44 cm -->
  <line x1="30" y1="150" x2="30" y2="228" stroke="#C0392B" stroke-width="1.5"/>
  <polygon points="26,156 34,156 30,148" fill="#C0392B"/><polygon points="26,222 34,222 30,230" fill="#C0392B"/>
  <text x="22" y="190" font-size="11" font-weight="700" fill="#C0392B" transform="rotate(-90 22 190)" text-anchor="middle">≈ 44 cm</text>

  <text x="20" y="270" font-size="10" fill="#333">Durchgehender Doppelbalken, 2 höhenverstellbare Beinpaare, hinten 80–100 cm Arbeitsraum.</text>
</svg>
