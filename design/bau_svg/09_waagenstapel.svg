<svg xmlns="http://www.w3.org/2000/svg" width="440" height="290" viewBox="0 0 440 290" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="290" fill="#ffffff"/>
  <text x="20" y="26" font-size="15" font-weight="700" fill="#4E342E">Waage &amp; Beute aufsetzen</text>

  <!-- Platte -->
  <rect x="110" y="210" width="220" height="20" fill="#E9D9B0" stroke="#C9A24B"/>
  <text x="345" y="224" font-size="10" fill="#333">Platte (eben)</text>

  <!-- Waage -->
  <rect x="130" y="168" width="170" height="40" fill="#CFD8DC" stroke="#607D8B"/>
  <text x="215" y="192" font-size="11" fill="#37474F" text-anchor="middle">HiveWatch 500×430</text>
  <text x="345" y="192" font-size="10" fill="#333">~72 mm</text>

  <!-- Beute -->
  <rect x="140" y="95" width="150" height="72" fill="#F0C868" stroke="#8B5E0B"/>
  <polygon points="134,95 296,95 282,78 148,78" fill="#8d6e3a" stroke="#5a4522"/>
  <text x="215" y="138" font-size="11" fill="#5a3d0a" text-anchor="middle">Dadant-Beute</text>
  <text x="345" y="130" font-size="10" fill="#333">B 455</text>

  <!-- Logger + Kabel -->
  <line x1="300" y1="188" x2="330" y2="188" stroke="#444" stroke-width="1.5"/>
  <rect x="330" y="182" width="24" height="16" rx="2" fill="#666" stroke="#333"/>
  <text x="342" y="176" font-size="9" fill="#333" text-anchor="middle">Logger</text>

  <text x="20" y="258" font-size="11" fill="#C0392B">Waage LOSE auflegen – nichts überbrücken (keine Steine/Leisten seitlich).</text>
  <text x="20" y="278" font-size="11" fill="#333">Reihenfolge Platte → Waage → Beute · tarieren, dann Beute aufsetzen.</text>
</svg>
