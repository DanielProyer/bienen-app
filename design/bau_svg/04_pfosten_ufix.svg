<svg xmlns="http://www.w3.org/2000/svg" width="440" height="300" viewBox="0 0 440 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="440" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="15" font-weight="700" fill="#4E342E">Pfosten in U-FIX durchbolzen</text>

  <!-- Boden -->
  <rect x="0" y="210" width="440" height="90" fill="#EBDFC3"/>
  <line x1="0" y1="210" x2="440" y2="210" stroke="#B79E6A" stroke-width="2"/>

  <!-- Erdschraube unter Boden -->
  <path d="M196 210 L244 210 L232 285 L208 285 Z" fill="#9AA0A6" stroke="#555"/>
  <text x="330" y="255" font-size="11" fill="#333">Erdschraube</text>

  <!-- U-FIX Bügel -->
  <path d="M188 150 L188 205 L252 205 L252 150" fill="none" stroke="#666" stroke-width="6"/>
  <text x="330" y="190" font-size="11" fill="#333">U-FIX-Aufnahme</text>

  <!-- Pfosten 90x90 -->
  <rect x="196" y="70" width="48" height="135" fill="#D2A970" stroke="#8B5E0B" stroke-width="1.5"/>
  <g stroke="#b98b4e" stroke-width="1"><line x1="204" y1="72" x2="204" y2="203"/><line x1="236" y1="72" x2="236" y2="203"/></g>
  <text x="330" y="110" font-size="11" fill="#333">Pfosten 90×90</text>
  <text x="330" y="125" font-size="11" fill="#333">(~120 mm)</text>

  <!-- Durchbolzung 8x100 -->
  <line x1="176" y1="180" x2="264" y2="180" stroke="#444" stroke-width="3"/>
  <polygon points="176,174 184,180 176,186" fill="#444"/>
  <polygon points="264,174 256,180 264,186" fill="#444"/>
  <text x="220" y="230" font-size="11" fill="#C0392B" text-anchor="middle">durchbolzen 8×100</text>

  <text x="20" y="285" font-size="11" fill="#333">Pfosten in die Aufnahme stellen, waagerecht ausrichten, seitlich durchbolzen.</text>
</svg>
