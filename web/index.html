<!DOCTYPE html>
<html>
<head>
  <base href="/bienen-app/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Bienen Arosa - Imkerei Projekt WebApp">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bienen Arosa">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Bienen Arosa</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Service Workers killen (Flutter SW ist deprecated)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }

    function clearAllCaches() {
      if ('caches' in window) {
        return caches.keys().then(function(names) {
          return Promise.all(names.map(function(n) { return caches.delete(n); }));
        });
      }
      return Promise.resolve();
    }

    function redirectToVersion(ver) {
      clearAllCaches().then(function() {
        window.location.replace(window.location.pathname + '?v=' + ver);
      });
    }

    var urlVersion = new URLSearchParams(window.location.search).get('v');

    fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var serverVer = data.version || '0';
        if (urlVersion !== serverVer) {
          redirectToVersion(serverVer);
          return;
        }
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js?v=' + serverVer;
        s.async = true;
        document.body.appendChild(s);

        // Auf neue Version prüfen (Poll + beim Wiedereinblenden der App)
        function checkForUpdate() {
          return fetch('version.json?_=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              if (d.version && d.version !== serverVer) {
                redirectToVersion(d.version);
              }
            }).catch(function() {});
        }
        setInterval(checkForUpdate, 60000);
        // Handy/PWA: beim Zurückkehren in die App sofort auf Updates prüfen
        document.addEventListener('visibilitychange', function() {
          if (!document.hidden) checkForUpdate();
        });
        window.addEventListener('focus', checkForUpdate);
      })
      .catch(function() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      });
  </script>
</body>
</html>
